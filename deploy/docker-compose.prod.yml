services:
  postgres:
    image: pgvector/pgvector:${POSTGRES_VERSION:-18}
    container_name: sentinel-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-sentinel_knowledgebase}
    volumes:
      - ./docker/postgresql:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  migrator:
    image: ${REGISTRY:-ghcr.io}/${IMAGE_NAMESPACE}/sentinel-migrator:${IMAGE_TAG:-latest}
    container_name: sentinel-migrator
    command:
      - --connection
      - Host=postgres;Port=5432;Database=${POSTGRES_DB:-sentinel_knowledgebase};Username=${POSTGRES_USER:-postgres};Password=${POSTGRES_PASSWORD}
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  api:
    image: ${REGISTRY:-ghcr.io}/${IMAGE_NAMESPACE}/sentinel-api:${IMAGE_TAG:-latest}
    container_name: sentinel-api
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://+:5000
      ASPNETCORE_FORWARDEDHEADERS_ENABLED: "true"
      ConnectionStrings__DefaultConnection: Host=postgres;Port=5432;Database=${POSTGRES_DB:-sentinel_knowledgebase};Username=${POSTGRES_USER:-postgres};Password=${POSTGRES_PASSWORD}
      OpenAI__ApiKey: ${OPENAI_API_KEY}
      OpenAI__Model: ${OPENAI_MODEL:-gpt-4}
      OpenAI__EmbeddingModel: ${OPENAI_EMBEDDING_MODEL:-text-embedding-3-small}
      OpenAI__EmbeddingsUrl: ${OPENAI_EMBEDDINGS_URL:-https://api.openai.com/v1/embeddings}
      OpenAI__ChatCompletionsUrl: ${OPENAI_CHAT_COMPLETIONS_URL:-https://api.openai.com/v1/chat/completions}
    depends_on:
      postgres:
        condition: service_healthy
      migrator:
        condition: service_completed_successfully
    networks:
      - default
      - ai
      - proxy
    restart: unless-stopped

  worker:
    image: ${REGISTRY:-ghcr.io}/${IMAGE_NAMESPACE}/sentinel-worker:${IMAGE_TAG:-latest}
    container_name: sentinel-worker
    environment:
      DOTNET_ENVIRONMENT: Production
      ConnectionStrings__DefaultConnection: Host=postgres;Port=5432;Database=${POSTGRES_DB:-sentinel_knowledgebase};Username=${POSTGRES_USER:-postgres};Password=${POSTGRES_PASSWORD}
      OpenAI__ApiKey: ${OPENAI_API_KEY}
      OpenAI__Model: ${OPENAI_MODEL:-gpt-4}
      OpenAI__EmbeddingModel: ${OPENAI_EMBEDDING_MODEL:-text-embedding-3-small}
      OpenAI__EmbeddingsUrl: ${OPENAI_EMBEDDINGS_URL:-https://api.openai.com/v1/embeddings}
      OpenAI__ChatCompletionsUrl: ${OPENAI_CHAT_COMPLETIONS_URL:-https://api.openai.com/v1/chat/completions}
    depends_on:
      postgres:
        condition: service_healthy
      migrator:
        condition: service_completed_successfully
    networks:
      - default
      - ai
    restart: unless-stopped

  web:
    image: ${REGISTRY:-ghcr.io}/${IMAGE_NAMESPACE}/sentinel-web:${IMAGE_TAG:-latest}
    container_name: sentinel-web
    depends_on:
      - api
    networks:
      - default
      - proxy
    labels:
      caddy: ${SENTINEL_DOMAIN}
      caddy.encode: zstd gzip
      caddy.0_reverse_proxy: /api/* sentinel-api:5000
      caddy.1_reverse_proxy: /health sentinel-api:5000
      caddy.2_reverse_proxy: /openapi/* sentinel-api:5000
      caddy.3_reverse_proxy: /scalar* sentinel-api:5000
      caddy.4_reverse_proxy: /hangfire* sentinel-api:5000
      caddy.5_reverse_proxy: sentinel-web:80
    restart: unless-stopped

networks:
  ai:
    external: true
    name: sentinel-ai
  proxy:
    external: true
    name: shared-proxy
