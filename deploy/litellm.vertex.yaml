model_list:
  - model_name: gemini-2.5-flash
    litellm_params:
      model: vertex_ai/gemini-2.5-flash

  - model_name: gpt-4
    litellm_params:
      model: vertex_ai/gemini-2.5-flash

  # Keep this alias only if you plan to route embeddings through Vertex.
  # Sentinel's current schema expects 1536 dimensions. Verify the returned
  # vector size before using this in production.
  - model_name: gemini-embedding-001
    litellm_params:
      model: vertex_ai/gemini-embedding-001

  - model_name: text-embedding-3-small
    litellm_params:
      model: vertex_ai/gemini-embedding-001
