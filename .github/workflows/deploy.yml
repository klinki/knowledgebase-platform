name: Build and Deploy

on:
  push:
    branches:
      - main
      - master
    paths:
      - "backend/**"
      - "frontend/**"
      - "deploy/**"
      - ".github/workflows/deploy.yml"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    outputs:
      image_namespace: ${{ steps.vars.outputs.image_namespace }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set image namespace
        id: vars
        run: |
          echo "image_namespace=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_OUTPUT"

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push API image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ steps.vars.outputs.image_namespace }}/sentinel-api:${{ github.sha }}
            ghcr.io/${{ steps.vars.outputs.image_namespace }}/sentinel-api:latest

      - name: Build and push Worker image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/Dockerfile.worker
          push: true
          tags: |
            ghcr.io/${{ steps.vars.outputs.image_namespace }}/sentinel-worker:${{ github.sha }}
            ghcr.io/${{ steps.vars.outputs.image_namespace }}/sentinel-worker:latest

      - name: Build and push Web image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ steps.vars.outputs.image_namespace }}/sentinel-web:${{ github.sha }}
            ghcr.io/${{ steps.vars.outputs.image_namespace }}/sentinel-web:latest

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      - name: Deploy on server
        uses: appleboy/ssh-action@v1.2.2
        env:
          IMAGE_TAG: ${{ github.sha }}
        with:
          host: ${{ secrets.DEPLOY_SSH_HOST }}
          username: ${{ secrets.DEPLOY_SSH_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script_stop: true
          envs: IMAGE_TAG
          script: |
            cd ${{ secrets.DEPLOY_PATH }}
            git fetch --all --prune
            git checkout ${{ github.ref_name }}
            git pull --ff-only
            IMAGE_TAG=${IMAGE_TAG} ./deploy/scripts/deploy.sh
