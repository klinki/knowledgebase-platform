name: Build and Deploy

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Docker image tag to build and deploy (default: current commit SHA)"
        required: false
        type: string

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    outputs:
      image_namespace: ${{ steps.vars.outputs.image_namespace }}
      image_tag: ${{ steps.vars.outputs.image_tag }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Resolve release variables
        id: vars
        run: |
          echo "image_namespace=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_OUTPUT"
          if [[ "${{ github.event_name }}" == "workflow_dispatch" && -n "${{ inputs.image_tag }}" ]]; then
            echo "image_tag=${{ inputs.image_tag }}" >> "$GITHUB_OUTPUT"
          elif [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            echo "image_tag=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          else
            echo "image_tag=${GITHUB_SHA}" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push API image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ steps.vars.outputs.image_namespace }}/sentinel-api:${{ steps.vars.outputs.image_tag }}
            ghcr.io/${{ steps.vars.outputs.image_namespace }}/sentinel-api:${{ github.sha }}
            ghcr.io/${{ steps.vars.outputs.image_namespace }}/sentinel-api:latest

      - name: Build and push Worker image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/Dockerfile.worker
          push: true
          tags: |
            ghcr.io/${{ steps.vars.outputs.image_namespace }}/sentinel-worker:${{ steps.vars.outputs.image_tag }}
            ghcr.io/${{ steps.vars.outputs.image_namespace }}/sentinel-worker:${{ github.sha }}
            ghcr.io/${{ steps.vars.outputs.image_namespace }}/sentinel-worker:latest

      - name: Build and push Web image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ steps.vars.outputs.image_namespace }}/sentinel-web:${{ steps.vars.outputs.image_tag }}
            ghcr.io/${{ steps.vars.outputs.image_namespace }}/sentinel-web:${{ github.sha }}
            ghcr.io/${{ steps.vars.outputs.image_namespace }}/sentinel-web:latest

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Upload deploy artifacts to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DEPLOY_SSH_HOST }}
          username: ${{ secrets.DEPLOY_SSH_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          passphrase: ${{ secrets.DEPLOY_SSH_PASSPHRASE }}
          source: "deploy/scripts/deploy.sh,deploy/docker-compose.prod.yml"
          target: ${{ secrets.DEPLOY_PATH }}
          overwrite: true

      - name: Deploy on server
        uses: appleboy/ssh-action@v1.2.2
        env:
          IMAGE_TAG: ${{ needs.build-and-push.outputs.image_tag }}
        with:
          host: ${{ secrets.DEPLOY_SSH_HOST }}
          username: ${{ secrets.DEPLOY_SSH_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          passphrase: ${{ secrets.DEPLOY_SSH_PASSPHRASE }}
          script_stop: true
          envs: IMAGE_TAG
          script: |
            cd ${{ secrets.DEPLOY_PATH }}
            chmod +x ./deploy/scripts/deploy.sh
            IMAGE_TAG=${IMAGE_TAG} ./deploy/scripts/deploy.sh
