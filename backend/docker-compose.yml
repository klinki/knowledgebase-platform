services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: sentinel-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: sentinel_knowledgebase
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  migrator:
    profiles: ["app"]
    build:
      context: .
      dockerfile: Dockerfile.migrator
    container_name: sentinel-migrator
    command:
      - --connection
      - Host=postgres;Port=5432;Database=sentinel_knowledgebase;Username=postgres;Password=postgres
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  api:
    profiles: ["app"]
    build:
      context: .
      dockerfile: Dockerfile
    container_name: sentinel-api
    environment:
      - ConnectionStrings__DefaultConnection=Host=postgres;Port=5432;Database=sentinel_knowledgebase;Username=postgres;Password=postgres
      - OpenAI__ApiKey=${OPENAI_API_KEY}
      - OpenAI__EmbeddingDimensions=${OPENAI_EMBEDDING_DIMENSIONS}
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:5000
    ports:
      - "5000:5000"
    depends_on:
      postgres:
        condition: service_healthy
      migrator:
        condition: service_completed_successfully
    restart: unless-stopped

  worker:
    profiles: ["app"]
    build:
      context: .
      dockerfile: Dockerfile.worker
    container_name: sentinel-worker
    environment:
      - ConnectionStrings__DefaultConnection=Host=postgres;Port=5432;Database=sentinel_knowledgebase;Username=postgres;Password=postgres
      - OpenAI__ApiKey=${OPENAI_API_KEY}
      - OpenAI__EmbeddingDimensions=${OPENAI_EMBEDDING_DIMENSIONS}
      - DOTNET_ENVIRONMENT=Development
    depends_on:
      postgres:
        condition: service_healthy
      migrator:
        condition: service_completed_successfully
    restart: unless-stopped

volumes:
  postgres_data:
